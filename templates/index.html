<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎧 Rádio Pulse Shazam — Modo Deus</title>

  <link rel="stylesheet" href="/static/style.css?v=20260616-spectrum-real">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/5/54/Radio_icon.svg" type="image/svg+xml">

  <!-- Capa default usada pelo script.js -->
  <script>
    window.DEFAULT_COVER_URL = "/static/default_cover.png?v=20260616-spectrum-real";
  </script>
</head>

<body>
  <div class="aurora aurora-a"></div>
  <div class="aurora aurora-b"></div>
  <div class="grid-bg"></div>

  <header class="topbar">
    <a class="brand" href="/" aria-label="Rádio Pulse">
      <span class="brand-orb">⚡</span>
      <div>
        <h1>Rádio Pulse</h1>
        <p>Shazam live scanner</p>
      </div>
    </a>

    <nav class="nav-actions">
      <div id="datetime" class="pill">—</div>
      <div id="weather" class="pill weather">🌤️ Lisboa • — °C</div>
      <a href="/grelha" class="btn btn-soft">📅 Grelha</a>
    </nav>
  </header>

  <main class="shell">
    <section class="hero-card">
      <div class="hero-glow"></div>

      <div class="station-row">
        <span class="live-dot"></span>
        <span id="stationLabel">Emissão automática</span>
      </div>

      <h2 id="progNome">A ligar à Rádio Pulse…</h2>
      <p id="progDesc" class="desc">A preparar stream, Shazam e equalizador.</p>
      <p id="proximoTxt" class="proximo">—</p>

      <div class="now-card">
        <div class="cover-wrap">
          <img id="coverArt" src="" alt="Capa da música" hidden>

          <div id="coverFallback" class="cover-fallback" aria-label="Capa default Rádio Pulse">
            <img
              id="defaultCoverImg"
              src="/static/default_cover.png?v=20260616-spectrum-real"
              alt="Capa default Rádio Pulse"
              onerror="this.src='/static/default_cover.png'"
            >
          </div>
        </div>

        <div class="track-box">
          <div class="kicker">Agora no ar</div>
          <div id="trackNow" class="track-title tocando">🎧 Tocando</div>
          <div id="trackMeta" class="track-meta">O Shazam vai analisar o áudio real da rádio.</div>
          <div id="shazamStatus" class="status-line">Pronto para identificar.</div>
        </div>
      </div>

      <canvas id="equalizer" width="920" height="150"></canvas>

      <!-- Player fino azul -->
      <div class="player-shell">
        <audio id="player" controls preload="none"></audio>
      </div>

      <div class="controls">
        <button id="playBtn" class="btn btn-primary">▶ Ligar rádio</button>
        <button id="identifyBtn" class="btn btn-neon">🧠 Identificar com Shazam</button>
        <button id="autoBtn" class="btn btn-soft active">🔄 Automático</button>
      </div>
    </section>
  </main>

  <aside id="logPanel" class="log-panel">
    <div class="log-title">
      <span>📡 Consola Pulse</span>
      <button id="toggleLogs" class="mini-btn">✖</button>
    </div>
    <div id="logContent"></div>
  </aside>

  <button id="showLogsBtn" class="show-logs">📋 Logs</button>

  <footer>© 2026 Rádio Pulse — Modo Deus Neon</footer>

  <script src="/static/script.js?v=20260616-spectrum-real"></script>
</body>
</html>
